<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Thank You | R. Courtney Painting</title>
<meta name="description" content="Thanks for reaching out. We'll be in touch shortly."/>
<link rel="canonical" href="https://rpcourtneypainting.com/thank-you"/>
<meta name="robots" content="noindex,follow"/>
<style>
  :root { color-scheme: light; }
  *,*::before,*::after { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: #f5f1ea; color: #1a1a1a; padding: 2rem; }
  main { max-width: 540px; text-align: center; background: #fff;
         border-radius: 16px; padding: 3rem 2rem; box-shadow: 0 12px 40px rgba(0,0,0,.06); }
  h1 { font-size: 2rem; margin: 0 0 1rem; line-height: 1.2; }
  p { color: #555; line-height: 1.6; margin: 0 0 2rem; }
  .check { width: 64px; height: 64px; margin: 0 auto 1.5rem; border-radius: 50%;
           background: #16a34a; display: grid; place-items: center; }
  .check::before { content: "✓"; color: #fff; font-size: 2rem; font-weight: 700; }
  .row { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
  a.btn { display: inline-block; padding: .85rem 1.5rem; border-radius: 999px;
          text-decoration: none; font-weight: 600; font-size: .95rem; }
  a.primary { background: #ea580c; color: #fff; }
  a.secondary { background: #f3f4f6; color: #1a1a1a; }
  .meta { margin-top: 2rem; font-size: .875rem; color: #6b7280; }
  .meta a { color: #1a1a1a; }
</style>
<style>.w-webflow-badge{display:none !important}</style></head>
<body>
<main>
  <div class="check" aria-hidden="true"></div>
  <h1>Thanks — we got your message.</h1>
  <p>Ryan or someone from R. Courtney Painting will be in touch within one business day with your free estimate.</p>
  <div class="row">
    <a class="btn primary" href="/">Back to home</a>
    <a class="btn secondary" href="tel:+16509215694">Call (650) 921-5694</a>
  </div>
  <p class="meta">Need it faster? Email <a href="mailto:rpcourtney@gmail.com">rpcourtney@gmail.com</a></p>
</main>
</body>
</html>
